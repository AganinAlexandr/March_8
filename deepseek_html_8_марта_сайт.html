    <style>
        /* Все ваши стили остаются без изменений */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #d4a5a5;
            overflow: hidden;
            position: relative;
        }
        
        .container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .image-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .main-image {
            position: absolute;
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 30px;
            box-shadow: 0 0 50px 20px #d4a5a5;
            z-index: 2;
        }
        
        .blurred-image {
            position: absolute;
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            filter: blur(25px);
            opacity: 0.8;
            z-index: 1;
        }
        
        .image-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 30%, #d4a5a5 80%);
            pointer-events: none;
            z-index: 3;
        }
        
        .dot {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
            will-change: opacity, transform;
        }
        
        .dot.white {
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
            box-shadow: 0 0 5px rgba(255,255,255,0.8);
        }
        
        .dot.berry {
            background: radial-gradient(circle, rgba(220,20,60,1) 0%, rgba(220,20,60,0.6) 50%, rgba(220,20,60,0) 100%);
            box-shadow: 0 0 5px rgba(220,20,60,0.8);
        }
    </style>

    <script>
        const container = document.getElementById('container');
        const dotCount = 300;
        const dots = [];
        
        function createDots() {
            for (let i = 0; i < dotCount; i++) {
                const dot = {
                    element: document.createElement('div'),
                    x: Math.random() * 100,
                    y: Math.random() * 100,
                    size: Math.random() * 3 + 1.5,
                    opacity: Math.random() * 0.8 + 0.2,
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.5 + Math.random() * 0.8
                };
                
                dot.element.classList.add('dot');
                dot.element.classList.add(Math.random() > 0.5 ? 'white' : 'berry');
                
                dot.element.style.width = dot.size + 'px';
                dot.element.style.height = dot.size + 'px';
                dot.element.style.left = dot.x + '%';
                dot.element.style.top = dot.y + '%';
                dot.element.style.opacity = dot.opacity;
                
                container.appendChild(dot.element);
                dots.push(dot);
            }
        }
        
        function animate() {
            const time = Date.now() / 100;
            
            dots.forEach((dot, index) => {
                const opacity = 0.3 + 0.7 * (Math.sin(time * dot.speed + dot.phase) * 0.5 + 0.5);
                
                dot.element.style.opacity = opacity;
                
                const scale = 0.8 + opacity * 1.2;
                dot.element.style.transform = `scale(${scale})`;
            });
            
            requestAnimationFrame(animate);
        }
        
        createDots();
        animate();
    </script>
